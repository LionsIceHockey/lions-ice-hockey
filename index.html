<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birmingham Lions Ice Hockey Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #0b1527;
    --red:        #c0181e;
    --red-bright: #e01f26;
    --white:      #ffffff;
    --silver:     #9ba8b8;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
  }

  /* ===================== HERO ===================== */
  .hero {
    position: relative;
    height: 100vh;
    min-height: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 7vh;
    overflow: hidden;
    text-align: center;
  }

  /* The background photo — replace src with your actual game photo filename */
  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('1779310388619_image.png'); /* REPLACE with your game photo filename */
    background-size: cover;
    background-position: center 30%;
    z-index: 0;
  }

  /* Dark gradient overlay so text is always readable */
  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(
        to bottom,
        rgba(11,21,39,0.15) 0%,
        rgba(11,21,39,0.1) 40%,
        rgba(11,21,39,0.75) 70%,
        rgba(11,21,39,0.97) 100%
      );
  }

  /* Thin red stripe at very top */
  .hero-top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: var(--red);
    z-index: 2;
  }

  /* All hero content sits above overlay */
  .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Small label above the title */
  .hero-eyebrow {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 0.9rem;
  }

  /* Main club name */
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.8rem, 11vw, 9rem);
    line-height: 0.9;
    letter-spacing: 0.04em;
    color: var(--white);
    text-shadow:
      0 2px 8px rgba(0,0,0,0.7),
      0 0 60px rgba(0,0,0,0.4);
    margin-bottom: 0.4rem;
  }

  .hero h1 .red {
    color: var(--red-bright);
    text-shadow:
      0 2px 8px rgba(0,0,0,0.7),
      0 0 40px rgba(192,24,30,0.4);
  }

  /* Subtitle line */
  .hero-sub {
    font-size: clamp(0.85rem, 2vw, 1.05rem);
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-bottom: 2.5rem;
  }

  /* Red divider line */
  .hero-rule {
    width: 60px;
    height: 3px;
    background: var(--red);
    margin: 0 auto 1.6rem;
  }

  /* CTA scroll button */
  .scroll-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--red);
    color: white;
    text-decoration: none;
    padding: 0.75rem 2.2rem;
    border-radius: 3rem;
    font-weight: 500;
    font-size: 0.9rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.2s, transform 0.2s;
  }

  .scroll-btn:hover { background: var(--red-bright); transform: translateY(-2px); }

  .puck {
    width: 14px; height: 14px;
    background: white; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }

  /* Scroll arrow at bottom */
  .scroll-arrow {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    animation: bounce 2s infinite;
    opacity: 0.5;
  }

  .scroll-arrow svg { width: 28px; height: 28px; }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }

  /* Hero logo */
  .hero-logo {
    width: clamp(80px, 14vw, 140px);
    height: auto;
    margin-bottom: 0.6rem;
    filter: drop-shadow(0 2px 12px rgba(0,0,0,0.6));
  }

  /* ===================== GALLERY ===================== */
  #gallery {
    padding: 5rem 1.5rem 6rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-eyebrow {
    text-align: center;
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--red-bright);
    margin-bottom: 0.6rem;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    letter-spacing: 0.04em;
    text-align: center;
    color: var(--white);
    margin-bottom: 0.5rem;
  }

  .section-rule {
    width: 48px; height: 3px;
    background: var(--red);
    margin: 0 auto 3rem;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  .gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    aspect-ratio: 4/3;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    cursor: pointer;
    transition: transform 0.25s;
  }

  .gallery-item:hover { transform: scale(1.025); z-index: 2; }

  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: filter 0.25s;
  }

  .gallery-item:hover img { filter: brightness(1.08); }

  .gallery-item .caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0.6rem 0.85rem;
    background: linear-gradient(transparent, rgba(11,21,39,0.88));
    font-size: 0.82rem;
    color: rgba(255,255,255,0.85);
    transform: translateY(100%);
    transition: transform 0.22s;
  }

  .gallery-item:hover .caption { transform: translateY(0); }

  .gallery-item.wide { grid-column: span 2; }
  .gallery-item.tall { grid-row: span 2; }

  .placeholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.5rem; padding: 1rem;
    color: rgba(255,255,255,0.18);
    font-size: 0.78rem; text-align: center;
  }

  .placeholder svg { width: 38px; height: 38px; opacity: 0.2; }

  /* ===================== LIGHTBOX ===================== */
  #lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.93);
    z-index: 1000;
    align-items: center; justify-content: center;
    padding: 2rem;
  }

  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 90vw; max-height: 85vh;
    border-radius: 4px; object-fit: contain;
  }

  .lb-close {
    position: fixed; top: 1.5rem; right: 1.5rem;
    background: none; border: 1.5px solid rgba(255,255,255,0.35);
    color: white; width: 40px; height: 40px; border-radius: 50%;
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }

  .lb-close:hover { background: rgba(255,255,255,0.12); }

  .lb-prev, .lb-next {
    position: fixed; top: 50%; transform: translateY(-50%);
    background: none; border: 1.5px solid rgba(255,255,255,0.3);
    color: white; width: 44px; height: 44px; border-radius: 50%;
    font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }

  .lb-prev { left: 1rem; }
  .lb-next { right: 1rem; }
  .lb-prev:hover, .lb-next:hover { background: rgba(255,255,255,0.12); }

  /* ===================== FOOTER ===================== */
  footer {
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 2rem; text-align: center;
    font-size: 0.78rem; color: rgba(255,255,255,0.2);
  }

  /* Upload preview button */
  .upload-bar {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%);
    background: rgba(192,24,30,0.92);
    color: white; border: none; border-radius: 3rem;
    padding: 0.75rem 1.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 500; cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    z-index: 100; display: flex; align-items: center; gap: 0.5rem;
    white-space: nowrap;
  }

  .upload-bar:hover { background: rgba(224,31,38,0.95); transform: translateX(-50%) translateY(-2px); }

  @media (max-width: 600px) {
    .gallery-item.wide { grid-column: span 1; }
    .gallery-item.tall { grid-row: span 1; }
  }
</style>
</head>

  <img id="lb-img" src="" alt="">
  <button class="lb-next" onclick="lbNav(1)" aria-label="Next">&#8594;</button>
</div>

<!-- GALLERY -->
<section id="gallery">
  <p class="section-eyebrow">Birmingham Lions Ice Hockey Club</p>
  <h2 class="section-title">Club Photos</h2>
  <div class="section-rule"></div>
  <div class="gallery-grid" id="grid"></div>
</section>

<!-- FOOTER -->
<footer>
  Birmingham Lions Ice Hockey Club &mdash; photo credits @brandpphotography
</footer>


<script>
  // ═══════════════════════════════════════════════════════════
  // PHOTOS — fill in your uploaded filenames and captions here
  // ═══════════════════════════════════════════════════════════
  const PHOTOS = [
    { src: 'a8d92055-0918-48db-a13a-a8eba3a0be1f.jpeg', caption: '', wide: true },
    { src: '717013a1-e0a1-4afe-84cd-2218af5c2073.jpeg', caption: '' },
    { src: 'f005ee82-055d-46d4-aa52-6128f04b0a7c.jpeg', caption: '' },
    { src: 'IMG_1320.jpeg', caption: '', wide: true },
    { src: 'IMG_1303.jpeg', caption: '' },
    { src: 'f26446e3-44fc-4e43-a462-82a6d4859f98.jpeg', caption: '' },
    { src: 'IMG_1076.jpeg', caption: '' },
    { src: 'IMG_1064.jpeg', caption: '' },
  ];

  // ═══════════════════════════════════════════════════════════
  // HERO BACKGROUND PHOTO
  // Upload your game photo to GitHub, then change the filename below:
  const HERO_PHOTO = 'IMG_1059.jpeg'; // e.g. 'IMG_1320.jpeg'
  // ═══════════════════════════════════════════════════════════

  document.title = "Birmingham Lions Ice Hockey Club";

  // Apply the hero background dynamically so you can change it easily
  if (HERO_PHOTO !== 'YOUR_GAME_PHOTO.jpeg') {
    document.querySelector('.hero-bg').style.backgroundImage = `url('${HERO_PHOTO}')`;
  }

  const grid = document.getElementById('grid');
  let lightboxIndex = 0;
  let allItems = [];

  function renderGallery(photos) {
    grid.innerHTML = '';
    allItems = [];

    if (!photos.length) {
      const placeholders = [
        { label: 'Team photo', wide: true },
        { label: 'Match night' },
        { label: 'Training' },
        { label: 'Goal celebration', wide: true },
        { label: 'On the ice' },
        { label: 'Away game' },
        { label: 'Pre-match' },
      ];
      placeholders.forEach(p => {
        const item = document.createElement('div');
        item.className = 'gallery-item' + (p.wide ? ' wide' : '');
        item.innerHTML = `<div class="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <circle cx="8.5" cy="10.5" r="1.5"/>
            <path d="M21 15l-5-5L5 19"/>
          </svg>
          <span>${p.label}</span>
        </div>`;
        grid.appendChild(item);
      });
      return;
    }

    photos.forEach((photo, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item' + (photo.wide ? ' wide' : '') + (photo.tall ? ' tall' : '');
      item.innerHTML = `
        <img src="${photo.src}" alt="${photo.caption || ''}" loading="lazy">
        ${photo.caption ? `<div class="caption">${photo.caption}</div>` : ''}
      `;
      item.addEventListener('click', () => openLightbox(i));
      grid.appendChild(item);
      allItems.push(photo.src);
    });
  }

  function openLightbox(index) {
    if (!allItems.length) return;
    lightboxIndex = index;
    document.getElementById('lb-img').src = allItems[index];
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function lbNav(dir) {
    lightboxIndex = (lightboxIndex + dir + allItems.length) % allItems.length;
    document.getElementById('lb-img').src = allItems[lightboxIndex];
  }

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
  });

  function handleUpload(event) {
    const files = Array.from(event.target.files);
    // First file becomes the hero background for preview
    if (files.length > 0) {
      document.querySelector('.hero-bg').style.backgroundImage = `url('${URL.createObjectURL(files[0])}')`;
    }
    const previews = files.map(f => ({ src: URL.createObjectURL(f), caption: f.name.replace(/\.[^.]+$/, '') }));
    renderGallery(previews);
  }

  renderGallery(PHOTOS);
</script>
</body>
</html>
